{# Форма входа (логин или email + пароль) #}
{% extends "base.html" %}
{% block title %}Логин{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card">
      <div class="card-body">
        <h3>Вход</h3>
        {% if message %}<div class="alert alert-danger">{{ message }}</div>{% endif %}
        <form method="POST" action="/login">
          <div class="mb-3">
            <label class="form-label">Логин (username/email)</label>
            <input class="form-control" type="text" name="login" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Пароль</label>
            <input class="form-control" type="password" name="password" required>
          </div>
          <button class="btn btn-primary w-100" type="submit">Логин</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
